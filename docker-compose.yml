services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notes_api
    ports:
      - "8000:8000"
    volumes:
      - notes_uploads:/app/uploads
      - notes_db:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/notes.db
      - UPLOAD_DIR=/app/uploads
      - SECRET_KEY=production-quality-secure-random-secret-key-for-jwt-signing
      - BACKEND_CORS_ORIGINS=["http://localhost:3000", "http://localhost:8000"]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  notes_uploads:
    driver: local
  notes_db:
    driver: local
